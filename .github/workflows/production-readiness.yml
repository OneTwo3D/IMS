name: Production Readiness

on:
  # Keep PR feedback before merge and a push gate after merge/admin updates.
  # The classifier below is event-aware so both triggers run the same policy.
  pull_request:
    branches:
      - development
  push:
    branches:
      - development

permissions:
  contents: read

concurrency:
  group: production-readiness-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AUTH_SECRET: production-readiness-ci-auth-secret
  AUTH_URL: http://localhost:3001
  NEXT_PUBLIC_APP_URL: http://localhost:3001
  CRON_SECRET: production-readiness-ci-cron-secret
  SETTINGS_ENCRYPTION_KEY: prod_readiness_ci_settings_key__
  CI: "true"

jobs:
  classify_changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run_expensive: ${{ steps.changed-files.outputs.run_expensive }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: changed-files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.event.after }}"
          fi

          if [ "$base" = "0000000000000000000000000000000000000000" ] || [ -z "$base" ] || [ -z "$head" ]; then
            echo "run_expensive=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git diff --name-only "$base" "$head" > changed-files.txt; then
            echo "run_expensive=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          run_expensive=false
          while IFS= read -r path; do
            case "$path" in
              *.md|docs/*|.gitignore|CHANGELOG.md)
                ;;
              *)
                run_expensive=true
                ;;
            esac
          done < changed-files.txt

          echo "run_expensive=$run_expensive" >> "$GITHUB_OUTPUT"

  validate:
    needs: classify_changes
    if: needs.classify_changes.outputs.run_expensive == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          # npm run validate compares Prisma changes against origin/development,
          # so this job intentionally keeps full history.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate --schema prisma/schema.prisma
      - run: npm run validate

  docs-workflows:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run docs:workflows:check

  preflight-production:
    needs: classify_changes
    if: needs.classify_changes.outputs.run_expensive == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      AUTH_URL: https://localhost:3001
      NEXT_PUBLIC_APP_URL: https://localhost:3001
      DATABASE_URL: postgresql://imsuser:password@localhost:5432/ims_ci
      BACKUP_DIR: /tmp/ims-preflight/backups
      UPLOAD_STORAGE_DIR: /tmp/ims-preflight/uploads
      PUBLIC_UPLOAD_STORAGE_DIR: /tmp/ims-preflight/public-uploads
      INVOICE_PDF_STORAGE_DIR: /tmp/ims-preflight/invoice-pdfs
      FILE_SCAN_MODE: disabled
      ALLOW_DATABASE_RESTORE: "false"
      ALLOW_DATABASE_RESTORE_UPLOAD: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Create writable production storage placeholders
        run: |
          mkdir -p \
            "$BACKUP_DIR" \
            "$UPLOAD_STORAGE_DIR/invoices" \
            "$UPLOAD_STORAGE_DIR/quarantine/invoices" \
            "$PUBLIC_UPLOAD_STORAGE_DIR/avatars" \
            "$PUBLIC_UPLOAD_STORAGE_DIR/branding" \
            "$INVOICE_PDF_STORAGE_DIR"
      - name: Verify disabled scanner preflight
        run: npm run preflight:production
        env:
          NODE_ENV: production
      - name: Verify command scanner preflight
        run: npm run preflight:production
        env:
          NODE_ENV: production
          FILE_SCAN_MODE: command
          FILE_SCAN_COMMAND_ARGV: '["true","{file}"]'

  build:
    needs: classify_changes
    if: needs.classify_changes.outputs.run_expensive == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate --schema prisma/schema.prisma
      - run: npm run build

  e2e-select:
    needs: classify_changes
    if: needs.classify_changes.outputs.run_expensive == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ims_ci
      E2E_BASE_URL: http://localhost:3001
      E2E_PORT: "3001"
      E2E_TEST_MODE: "1"
      E2E_ROUTE_SECRET: ${{ secrets.E2E_ROUTE_SECRET || 'e2e-route-secret' }}
      E2E_WEB_SERVER_TIMEOUT_MS: "240000"
      E2E_WORKERS: "1"
      E2E_RETRIES: "1"
    services:
      postgres:
        image: postgres:14.13
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ims_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ims_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate --schema prisma/schema.prisma
      - run: npx prisma migrate deploy --schema prisma/schema.prisma
      # Playwright's webServer command seeds E2E data immediately before
      # starting Next.js; keeping seed there avoids double-seeding races.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - run: npx playwright install --with-deps chromium
      - name: Run selected E2E workflow without third-party integrations
        run: npm run e2e:select -- --workflow=sales-order --no-integrations
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14
